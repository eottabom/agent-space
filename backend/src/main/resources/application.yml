server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:agentspace.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        jdbc:
          batch_size: 50
    open-in-view: false

logging:
  level:
    com.agentspace: DEBUG
