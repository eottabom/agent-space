name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.9.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag }}"
          TAG="$(echo "$TAG" | xargs)"
          test -n "$TAG"
          git fetch --tags --force
          git rev-parse -q --verify "refs/tags/$TAG" >/dev/null || {
            echo "Tag not found: $TAG"
            exit 1
          }

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: ${{ needs.prepare.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_glob: "node-backend/electron-dist/*.AppImage"
          - os: macos-latest
            artifact_glob: "node-backend/electron-dist/*.dmg"
          - os: windows-latest
            artifact_glob: "node-backend/electron-dist/*.exe"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            node-backend/package-lock.json

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        shell: bash
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: |
          set -euo pipefail
          echo "PYTHON=${PYTHON}"
          python --version
          "$PYTHON" --version

      - name: Validate tag and sync package files
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.prepare.outputs.tag }}"
          TAG="$(echo "$TAG" | xargs)"
          test -n "$TAG"
          VERSION="$(node node-backend/scripts/version.js read)"
          test "$TAG" = "v$VERSION" || {
            echo "Tag $TAG does not match version.properties ($VERSION)"
            exit 1
          }

          node node-backend/scripts/version.js sync

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: node-backend
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          npm_config_python: ${{ steps.setup-python.outputs.python-path }}
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Electron package
        working-directory: node-backend
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          npm_config_python: ${{ steps.setup-python.outputs.python-path }}
        run: |
          npm run build
          npx electron-builder --publish never

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: true
