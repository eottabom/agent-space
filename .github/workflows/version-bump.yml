name: 🚀 Version Bump

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semver bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            node-backend/package-lock.json

      - name: Bump version and sync package files
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node node-backend/scripts/version.js bump "${{ inputs.release_type }}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties frontend/package.json frontend/package-lock.json node-backend/package.json node-backend/package-lock.json
          git commit -m "[skip ci] bump version to v${{ steps.version.outputs.version }}"
          git push

      - name: Create and push tag
        run: |
          set -euo pipefail
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
