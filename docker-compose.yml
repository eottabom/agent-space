services:
  backend:
    image: eclipse-temurin:25-jdk
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    network_mode: host
    command: ./gradlew bootRun --no-daemon

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "5173:5173"
    network_mode: host
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  frontend_modules:
